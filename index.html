<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTAL FOLD</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #D4A853;
  --neon: #00ff88;
  --bg: #050505;
  --panel-bg: rgba(8,8,8,0.88);
  --text: #e0e0e0;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  user-select: none;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  cursor: crosshair;
}
#ui {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.panel {
  background: var(--panel-bg);
  border: 1px solid rgba(212,168,83,0.35);
  border-radius: 6px;
  padding: 12px 14px;
  pointer-events: all;
  backdrop-filter: blur(6px);
}
.panel-title {
  font-family: 'Syncopate', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.btn-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.btn {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 5px 10px;
  border: 1px solid rgba(212,168,83,0.4);
  background: rgba(20,18,12,0.7);
  color: var(--accent);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.btn:hover {
  background: rgba(212,168,83,0.18);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(212,168,83,0.3);
}
.btn.active {
  background: rgba(212,168,83,0.3);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 14px rgba(212,168,83,0.4);
}
.btn.neon {
  border-color: rgba(0,255,136,0.4);
  color: var(--neon);
  background: rgba(0,20,12,0.7);
}
.btn.neon:hover {
  background: rgba(0,255,136,0.15);
  border-color: var(--neon);
  box-shadow: 0 0 10px rgba(0,255,136,0.3);
}
.btn.neon.active {
  background: rgba(0,255,136,0.25);
  border-color: var(--neon);
  color: #fff;
  box-shadow: 0 0 14px rgba(0,255,136,0.4);
}
.btn.audio {
  border-color: rgba(180,100,255,0.4);
  color: #b464ff;
  background: rgba(20,8,30,0.7);
}
.btn.audio:hover {
  background: rgba(180,100,255,0.15);
  border-color: #b464ff;
  box-shadow: 0 0 10px rgba(180,100,255,0.3);
}
.btn.audio.active {
  background: rgba(180,100,255,0.25);
  border-color: #b464ff;
  color: #fff;
  box-shadow: 0 0 14px rgba(180,100,255,0.4);
}
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.slider-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #888;
  min-width: 70px;
  letter-spacing: 1px;
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100px;
  height: 3px;
  background: rgba(212,168,83,0.25);
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(212,168,83,0.6);
}
#hint {
  position: fixed;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1.5px;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}
#stats {
  position: fixed;
  top: 14px;
  right: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(212,168,83,0.5);
  text-align: right;
  pointer-events: none;
  line-height: 1.8;
}
#fold-count {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Syncopate', sans-serif;
  font-size: 11px;
  color: rgba(212,168,83,0.4);
  letter-spacing: 3px;
  pointer-events: none;
}
#audio-status {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: rgba(180,100,255,0.6);
  letter-spacing: 2px;
  pointer-events: none;
}
#theme-tag {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  color: rgba(180,100,255,0.5);
  letter-spacing: 3px;
  pointer-events: none;
  transition: color 0.3s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="trail" style="position:fixed;top:0;left:0;pointer-events:none;opacity:0.12;"></canvas>

<div id="ui">
  <div class="panel">
    <div class="panel-title">Fold Mode</div>
    <div class="btn-row">
      <button class="btn active" data-mode="mirror">MIRROR</button>
      <button class="btn" data-mode="radial">RADIAL</button>
      <button class="btn" data-mode="crystal">CRYSTAL</button>
      <button class="btn" data-mode="kaleido">KALEIDO</button>
      <button class="btn" data-mode="fractal">FRACTAL</button>
      <button class="btn" data-mode="triply">TRIPLY</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Draw</div>
    <div class="btn-row">
      <button class="btn neon active" data-tool="line">LINE</button>
      <button class="btn neon" data-tool="circle">CIRCLE</button>
      <button class="btn neon" data-tool="triangle">TRI</button>
      <button class="btn neon" data-tool="rect">RECT</button>
      <button class="btn neon" data-tool="star">STAR</button>
      <button class="btn neon" data-tool="scatter">SCATTER</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Canvas</div>
    <div class="btn-row">
      <button class="btn" id="clearBtn">CLEAR</button>
      <button class="btn" id="undoBtn">UNDO</button>
      <button class="btn" id="saveBtn">SAVE</button>
      <button class="btn" id="demoBtn">DEMO</button>
      <button class="btn" id="meshBtn">MESH</button>
      <button class="btn audio" id="audioBtn">AUDIO</button>
    </div>
    <div class="slider-wrap">
      <span class="slider-label">SPEED</span>
      <input type="range" id="speedSlider" min="0" max="100" value="30">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">GLOW</span>
      <input type="range" id="glowSlider" min="0" max="100" value="60">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">RADIAL N</span>
      <input type="range" id="radialN" min="3" max="16" value="6">
    </div>
    <div class="slider-wrap">
      <span class="slider-label">MESH D</span>
      <input type="range" id="meshDist" min="20" max="200" value="80">
    </div>
  </div>
</div>

<div id="stats">
  FRACTAL FOLD<br>
  <span id="foldStat">0 foldLines</span><br>
  <span id="shapeStat">0 shapes</span>
</div>
<div id="audio-status"></div>
<div id="theme-tag">NEON</div>
<div id="fold-count"></div>
<div id="hint">CLICK + DRAG to draw · RIGHT-CLICK fold line · SCROLL zoom · T theme · L mesh · P screenshot · R random · S save</div>

<script>
// ─── Canvas Setup ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const trailCanvas = document.getElementById('trail');
const trailCtx = trailCanvas.getContext('2d');
let W, H, CX, CY;
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, lastPan = { x: 0, y: 0 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  trailCanvas.width = W;
  trailCanvas.height = H;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ─── Color Themes ───
const themes = {
  neon: { accent: '#D4A853', neon: '#00ff88', bg: '#050505', grid: 'rgba(0,255,136,0.06)', foldLine: 'rgba(0,255,136,0.35)', audio: '#b464ff', hueBase: 120 },
  gold: { accent: '#D4A853', neon: '#FFD700', bg: '#050500', grid: 'rgba(255,215,0,0.06)', foldLine: 'rgba(255,215,0,0.35)', audio: '#b464ff', hueBase: 45 },
  cyber: { accent: '#00b4d8', neon: '#00ffff', bg: '#000508', grid: 'rgba(0,180,216,0.06)', foldLine: 'rgba(0,180,216,0.35)', audio: '#ff6b9d', hueBase: 190 },
  void: { accent: '#9d4edd', neon: '#c77dff', bg: '#08000f', grid: 'rgba(157,78,221,0.06)', foldLine: 'rgba(157,78,221,0.35)', audio: '#ff6b9d', hueBase: 280 }
};
let currentTheme = 'neon';
let themeNames = Object.keys(themes);
let themeIdx = 0;

function getTheme() { return themes[currentTheme]; }
function cycleTheme() {
  themeIdx = (themeIdx + 1) % themeNames.length;
  currentTheme = themeNames[themeIdx];
  document.getElementById('theme-tag').textContent = currentTheme.toUpperCase();
  document.getElementById('theme-tag').style.color = getTheme().audio + '99';
  document.documentElement.style.setProperty('--accent', getTheme().accent);
  document.documentElement.style.setProperty('--neon', getTheme().neon);
  document.documentElement.style.setProperty('--bg', getTheme().bg);
  // Update slider thumb colors
  document.querySelectorAll('input[type="range"]::-webkit-slider-thumb').forEach(thumb => {
    thumb.style.background = getTheme().accent;
    thumb.style.boxShadow = `0 0 6px ${getTheme().accent}99`;
  });
}
cycleTheme();

// ─── State ───
let mode = 'mirror';
let tool = 'line';
let shapes = [];
let foldLines = [];
let history = [];
let drawing = null;
let radialCount = 6;
let animTime = 0;
let demoTimer = 0;
let demoMode = false;
let speed = 0.3;
let glowIntensity = 0.6;
let hoveredFoldIdx = -1;
let particles = [];
let showMesh = false;
let meshDist = 80;
let audioCtx = null, analyser = null, dataArray = null;
let audioEnabled = false;
let audioLevel = 0, bassLevel = 0, midLevel = 0, highLevel = 0;
let lastBass = 0, beatThreshold = 0;
let beatCooldown = 0;

// ─── Audio ───
async function initAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioEnabled = true;
    document.getElementById('audio-status').textContent = 'AUDIO ACTIVE';
    document.getElementById('audioBtn').classList.add('active');
  } catch (e) {
    audioEnabled = false;
    document.getElementById('audio-status').textContent = 'MIC DENIED';
    setTimeout(() => { document.getElementById('audio-status').textContent = ''; }, 2000);
  }
}

function getAudioLevels() {
  if (!audioEnabled || !analyser) return;
  analyser.getByteFrequencyData(dataArray);
  const len = dataArray.length;
  let bass = 0, mid = 0, high = 0;
  for (let i = 0; i < len * 0.15; i++) bass += dataArray[i];
  for (let i = Math.floor(len * 0.15); i < len * 0.5; i++) mid += dataArray[i];
  for (let i = Math.floor(len * 0.5); i < len; i++) high += dataArray[i];
  bass /= (len * 0.15 * 255);
  mid /= (len * 0.35 * 255);
  high /= (len * 0.5 * 255);
  const raw = bass + mid + high;
  audioLevel = audioLevel * 0.8 + raw * 0.2;
  bassLevel = bassLevel * 0.85 + bass * 0.15;
  midLevel = midLevel * 0.85 + mid * 0.15;
  highLevel = highLevel * 0.85 + high * 0.15;

  // Beat detection
  if (beatCooldown > 0) beatCooldown--;
  if (bass > beatThreshold && bass > 0.4 && beatCooldown === 0) {
    beatCooldown = 8;
    beatThreshold = bass * 0.9;
    onBeat();
  }
  if (bass < beatThreshold * 0.7) beatThreshold = Math.max(0.3, beatThreshold * 0.95);
}

function onBeat() {
  // Spawn particles from all shape centers
  shapes.slice(-8).forEach(s => {
    const screenX = (s.x + CX + panX);
    const screenY = (s.y + CY + panY);
    const hue = getTheme().hueBase + Math.random() * 60;
    spawnParticles(screenX, screenY, hue, 8 + Math.floor(audioLevel * 15));
  });
  // Pulse all shapes briefly
  shapes.forEach(s => { s.beatPulse = 1.0; });
}

// ─── Shape Classes ───
class DrawShape {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.hue = getTheme().hueBase + Math.random() * 60;
    this.age = 0;
    this.pulse = Math.random() * Math.PI * 2;
    this.beatPulse = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
    this.rotation = Math.random() * Math.PI * 2;
  }
  update() {
    this.age++;
    this.pulse += 0.05;
    this.rotation += this.rotSpeed * (1 + audioLevel * 3);
    if (this.beatPulse > 0) this.beatPulse -= 0.05;
  }
  draw(ctx) {}
  getScale() {
    return 1 + this.beatPulse * 0.3 + bassLevel * 0.5;
  }
  getCenter() { return { x: this.x, y: this.y }; }
}

class LineShape extends DrawShape {
  constructor(x, y, x2, y2) {
    super(x, y);
    this.x2 = x2; this.y2 = y2;
    this.len = Math.hypot(x2-x, y2-y);
  }
  draw(ctx) {
    const sc = this.getScale();
    const g = ctx.createLinearGradient(this.x, this.y, this.x2, this.y2);
    g.addColorStop(0, `hsla(${this.hue},100%,60%,0.9)`);
    g.addColorStop(1, `hsla(${(this.hue+60)%360},100%,65%,0.7)`);
    ctx.strokeStyle = g;
    ctx.lineWidth = (2 + glowIntensity * 2) * sc;
    ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
    ctx.shadowBlur = (10 + glowIntensity * 20) * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x2, this.y2);
    ctx.stroke();
    ctx.fillStyle = `hsl(${this.hue},100%,80%)`;
    ctx.shadowBlur = (15 + glowIntensity * 25) * sc;
    ctx.beginPath(); ctx.arc(this.x, this.y, 3 * sc, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.x2, this.y2, 3 * sc, 0, Math.PI*2); ctx.fill();
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getFoldInstances(mode, foldLines, this.x, this.y, this.x2, this.y2);
    instances.forEach(([ax,ay,ax2,ay2]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      const g = ctx.createLinearGradient(ax, ay, ax2, ay2);
      g.addColorStop(0, `hsla(${this.hue},100%,60%,0.9)`);
      g.addColorStop(1, `hsla(${(this.hue+60)%360},100%,65%,0.7)`);
      ctx.strokeStyle = g;
      ctx.lineWidth = (2 + glowIntensity * 2) * sc;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = (10 + glowIntensity * 20) * sc;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax2, ay2);
      ctx.stroke();
      ctx.fillStyle = `hsl(${this.hue},100%,80%)`;
      ctx.shadowBlur = (15 + glowIntensity * 25) * sc;
      ctx.beginPath(); ctx.arc(ax, ay, 3 * sc, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ax2, ay2, 3 * sc, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }
  getCenter() { return { x: (this.x + this.x2) / 2, y: (this.y + this.y2) / 2 }; }
}

class CircleShape extends DrawShape {
  constructor(x, y, r) {
    super(x, y);
    this.r = Math.abs(r);
  }
  draw(ctx) {
    const sc = this.getScale();
    const pulseR = Math.max(0.1, this.r * (1 + 0.08 * Math.sin(this.pulse)) * sc);
    ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
    ctx.lineWidth = (2 + glowIntensity * 2) * sc;
    ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
    ctx.shadowBlur = (12 + glowIntensity * 22) * sc;
    ctx.beginPath();
    ctx.arc(this.x, this.y, pulseR, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = `hsla(${this.hue},100%,60%,0.12)`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4 * sc, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${this.hue},100%,80%)`;
    ctx.fill();
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getCircleInstances(mode, foldLines, this.x, this.y, this.r);
    instances.forEach(([ax, ay, ar]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      const pulseR = Math.max(0.1, ar * (1 + 0.08 * Math.sin(this.pulse)) * sc);
      ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
      ctx.lineWidth = (2 + glowIntensity * 2) * sc;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = (12 + glowIntensity * 22) * sc;
      ctx.beginPath();
      ctx.arc(ax, ay, pulseR, 0, Math.PI*2);
      ctx.stroke();
      ctx.fillStyle = `hsla(${this.hue},100%,60%,0.12)`;
      ctx.fill();
      ctx.restore();
    });
  }
}

class TriangleShape extends DrawShape {
  constructor(x, y, x2, y2) {
    super(x, y);
    this.x2 = x2; this.y2 = y2;
    const mx = (x+x2)/2, my = (y+y2)/2;
    const dx = x2-x, dy = y2-y;
    this.x3 = mx - dy; this.y3 = my + dx;
  }
  _path(ctx) {
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x2, this.y2);
    ctx.lineTo(this.x3, this.y3);
    ctx.closePath();
  }
  draw(ctx) {
    const sc = this.getScale();
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(sc, sc);
    ctx.translate(-this.x, -this.y);
    this._path(ctx);
    ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
    ctx.lineWidth = 2 + glowIntensity * 2;
    ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
    ctx.shadowBlur = 12 + glowIntensity * 22;
    ctx.stroke();
    ctx.fillStyle = `hsla(${this.hue},100%,60%,0.1)`;
    ctx.fill();
    ctx.restore();
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getTriInstances(mode, foldLines, this.x,this.y, this.x2,this.y2, this.x3,this.y3);
    instances.forEach(([ax,ay,ax2,ay2,ax3,ay3]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      ctx.translate(ax, ay);
      ctx.rotate(this.rotation);
      ctx.scale(sc, sc);
      ctx.translate(-ax, -ay);
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(ax2,ay2); ctx.lineTo(ax3,ay3);
      ctx.closePath();
      ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
      ctx.lineWidth = 2 + glowIntensity * 2;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = 12 + glowIntensity * 22;
      ctx.stroke();
      ctx.fillStyle = `hsla(${this.hue},100%,60%,0.1)`;
      ctx.fill();
      ctx.restore();
    });
  }
}

class RectShape extends DrawShape {
  constructor(x, y, w, h) {
    super(x, y);
    this.w = w; this.h = h;
  }
  draw(ctx) {
    const sc = this.getScale();
    ctx.save();
    ctx.translate(this.x + this.w/2, this.y + this.h/2);
    ctx.rotate(this.rotation);
    ctx.scale(sc, sc);
    ctx.translate(-(this.x + this.w/2), -(this.y + this.h/2));
    ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
    ctx.lineWidth = 2 + glowIntensity * 2;
    ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
    ctx.shadowBlur = 10 + glowIntensity * 20;
    ctx.strokeRect(this.x, this.y, this.w, this.h);
    ctx.fillStyle = `hsla(${this.hue},100%,60%,0.08)`;
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.restore();
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getRectInstances(mode, foldLines, this.x,this.y,this.w,this.h);
    instances.forEach(([ax,ay,aw,ah]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      ctx.translate(ax + aw/2, ay + ah/2);
      ctx.rotate(this.rotation);
      ctx.scale(sc, sc);
      ctx.translate(-(ax + aw/2), -(ay + ah/2));
      ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.85)`;
      ctx.lineWidth = 2 + glowIntensity * 2;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = 10 + glowIntensity * 20;
      ctx.strokeRect(ax, ay, aw, ah);
      ctx.fillStyle = `hsla(${this.hue},100%,60%,0.08)`;
      ctx.fillRect(ax, ay, aw, ah);
      ctx.restore();
    });
  }
}

class StarShape extends DrawShape {
  constructor(x, y, r) {
    super(x, y);
    this.r = Math.abs(r) || 40;
    this.points = 5;
  }
  _path(ctx) {
    ctx.beginPath();
    for (let i = 0; i < this.points * 2; i++) {
      const angle = (i / (this.points * 2)) * Math.PI * 2 - Math.PI / 2;
      const rad = i % 2 === 0 ? this.r : this.r * 0.4;
      const px = this.x + Math.cos(angle) * rad;
      const py = this.y + Math.sin(angle) * rad;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }
  draw(ctx) {
    const sc = this.getScale();
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.scale(sc, sc);
    ctx.translate(-this.x, -this.y);
    this._path(ctx);
    ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.9)`;
    ctx.lineWidth = 2 + glowIntensity * 2;
    ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
    ctx.shadowBlur = 15 + glowIntensity * 25;
    ctx.stroke();
    ctx.fillStyle = `hsla(${this.hue},100%,60%,0.15)`;
    ctx.fill();
    ctx.restore();
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getFoldInstances(mode, foldLines, this.x, this.y, this.x + this.r, this.y);
    instances.forEach(([ax, ay, ax2, ay2]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      const r = Math.hypot(ax2-ax, ay2-ay);
      ctx.translate(ax, ay);
      ctx.rotate(this.rotation);
      ctx.scale(sc, sc);
      ctx.beginPath();
      for (let i = 0; i < this.points * 2; i++) {
        const angle = (i / (this.points * 2)) * Math.PI * 2 - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.4;
        const px = Math.cos(angle) * rad;
        const py = Math.sin(angle) * rad;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = `hsla(${this.hue},100%,65%,0.9)`;
      ctx.lineWidth = 2 + glowIntensity * 2;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = 15 + glowIntensity * 25;
      ctx.stroke();
      ctx.fillStyle = `hsla(${this.hue},100%,60%,0.15)`;
      ctx.fill();
      ctx.restore();
    });
  }
}

class ScatterShape extends DrawShape {
  constructor(x, y, count) {
    super(x, y);
    this.count = count || 30;
    this.pts = Array.from({length: this.count}, () => ({
      ox: (Math.random()-0.5)*120,
      oy: (Math.random()-0.5)*120,
      r: 2 + Math.random() * 4
    }));
  }
  draw(ctx) {
    const sc = this.getScale();
    this.pts.forEach(p => {
      ctx.fillStyle = `hsla(${this.hue},100%,65%,0.8)`;
      ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
      ctx.shadowBlur = (8 + glowIntensity * 12) * sc;
      ctx.beginPath();
      ctx.arc(this.x + p.ox, this.y + p.oy, p.r * (0.8 + 0.2*Math.sin(this.pulse + p.ox)) * sc, 0, Math.PI*2);
      ctx.fill();
    });
  }
  drawFolded(ctx, mode, foldLines) {
    const instances = getFoldInstances(mode, foldLines, this.x, this.y, this.x, this.y);
    const pts = this.pts;
    instances.forEach(([ax,ay]) => {
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.translate(CX, CY);
      const sc = this.getScale();
      pts.forEach(p => {
        ctx.fillStyle = `hsla(${this.hue},100%,65%,0.8)`;
        ctx.shadowColor = `hsl(${this.hue},100%,60%)`;
        ctx.shadowBlur = (8 + glowIntensity * 12) * sc;
        ctx.beginPath();
        ctx.arc(ax + p.ox, ay + p.oy, p.r * (0.8 + 0.2*Math.sin(this.pulse + p.ox)) * sc, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.restore();
    });
  }
}

// ─── Fold Geometry ───
function reflectPoint(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.hypot(dx, dy);
  if (len < 0.001) return {x: px, y: py};
  const t = ((px-x1)*dx + (py-y1)*dy) / (len*len);
  return {x: 2*t*x1 + 2*t*dx - px, y: 2*t*y1 + 2*t*dy - py};
}

function getLineInstances(foldLines, x, y, x2, y2) {
  if (!foldLines.length) return [[x,y,x2,y2]];
  let instances = [[x,y,x2,y2]];
  foldLines.forEach(f => {
    const next = [];
    instances.forEach(([ax,ay,ax2,ay2]) => {
      next.push([ax,ay,ax2,ay2]);
      const r1 = reflectPoint(ax,ay, f.x1,f.y1, f.x2,f.y2);
      const r2 = reflectPoint(ax2,ay2, f.x1,f.y1, f.x2,f.y2);
      next.push([r1.x,r1.y, r2.x,r2.y]);
    });
    instances = next;
  });
  return instances;
}

function getCircleInstances(mode, foldLines, x, y, r) {
  if (!foldLines.length && mode !== 'radial' && mode !== 'kaleido' && mode !== 'fractal' && mode !== 'triply') return [[x,y,r]];
  let result = [[x,y,r]];
  if (mode === 'mirror' && foldLines.length) {
    foldLines.forEach(f => {
      const next = [];
      result.forEach(([cx,cy,cr]) => {
        next.push([cx,cy,cr]);
        const rc = reflectPoint(cx,cy, f.x1,f.y1, f.x2,f.y2);
        next.push([rc.x,rc.y,cr]);
      });
      result = next;
    });
  }
  if (mode === 'radial') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + animTime * speed * 0.1;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, r]);
    }
  }
  if (mode === 'kaleido') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, r]);
      const a2 = -a;
      result.push([x*Math.cos(a2) - y*Math.sin(a2), x*Math.sin(a2) + y*Math.cos(a2), r]);
    }
  }
  if (mode === 'crystal') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, r]);
      const rc = reflectPoint(x*cos - y*sin, x*sin + y*cos, 0, 0, cos*100, sin*100);
      result.push([rc.x, rc.y, r]);
    }
  }
  if (mode === 'triply') {
    const n = 3;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, r]);
    }
  }
  if (mode === 'fractal') {
    result = [];
    const subdiv = 4;
    for (let i = 0; i < subdiv; i++) {
      for (let j = 0; j < subdiv; j++) {
        const sx = x * (0.4 + i * 0.3);
        const sy = y * (0.4 + j * 0.3);
        result.push([sx, sy, r * 0.35]);
      }
    }
  }
  return result;
}

function getTriInstances(mode, foldLines, x,y, x2,y2, x3,y3) {
  if (!foldLines.length && mode !== 'radial' && mode !== 'kaleido' && mode !== 'fractal' && mode !== 'triply') return [[x,y,x2,y2,x3,y3]];
  let result = [[x,y,x2,y2,x3,y3]];
  if (mode === 'mirror' && foldLines.length) {
    foldLines.forEach(f => {
      const next = [];
      result.forEach(([ax,ay,ax2,ay2,ax3,ay3]) => {
        next.push([ax,ay,ax2,ay2,ax3,ay3]);
        const r1 = reflectPoint(ax,ay, f.x1,f.y1, f.x2,f.y2);
        const r2 = reflectPoint(ax2,ay2, f.x1,f.y1, f.x2,f.y2);
        const r3 = reflectPoint(ax3,ay3, f.x1,f.y1, f.x2,f.y2);
        next.push([r1.x,r1.y, r2.x,r2.y, r3.x,r3.y]);
      });
      result = next;
    });
  }
  if (mode === 'radial') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + animTime * speed * 0.1;
      const cos = Math.cos(a), sin = Math.sin(a);
      const rot = (px,py) => [px*cos - py*sin, px*sin + py*cos];
      const [rx,ry] = rot(x,y);
      const [rx2,ry2] = rot(x2,y2);
      const [rx3,ry3] = rot(x3,y3);
      result.push([rx,ry,rx2,ry2,rx3,ry3]);
    }
  }
  if (mode === 'kaleido') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      const rot = (px,py) => [px*cos - py*sin, px*sin + py*cos];
      const [rx,ry] = rot(x,y);
      const [rx2,ry2] = rot(x2,y2);
      const [rx3,ry3] = rot(x3,y3);
      result.push([rx,ry,rx2,ry2,rx3,ry3]);
      const [rx2b,ry2b] = rot(-x,-y);
      const [rx2c,ry2c] = rot(-x2,-y2);
      const [rx3c,ry3c] = rot(-x3,-y3);
      result.push([rx2b,ry2b,rx2c,ry2c,rx3c,ry3c]);
    }
  }
  if (mode === 'crystal') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      const rot = (px,py) => [px*cos - py*sin, px*sin + py*cos];
      const [rx,ry] = rot(x,y);
      const [rx2,ry2] = rot(x2,y2);
      const [rx3,ry3] = rot(x3,y3);
      result.push([rx,ry,rx2,ry2,rx3,ry3]);
    }
  }
  if (mode === 'triply') {
    const n = 3;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      const rot = (px,py) => [px*cos - py*sin, px*sin + py*cos];
      const [rx,ry] = rot(x,y);
      const [rx2,ry2] = rot(x2,y2);
      const [rx3,ry3] = rot(x3,y3);
      result.push([rx,ry,rx2,ry2,rx3,ry3]);
    }
  }
  if (mode === 'fractal') {
    result = [];
    const subdiv = 4;
    for (let i = 0; i < subdiv; i++) {
      for (let j = 0; j < subdiv; j++) {
        const sx = x * (0.4 + i * 0.3);
        const sy = y * (0.4 + j * 0.3);
        const sx2 = x2 * (0.4 + i * 0.3);
        const sy2 = y2 * (0.4 + j * 0.3);
        const sx3 = x3 * (0.4 + i * 0.3);
        const sy3 = y3 * (0.4 + j * 0.3);
        result.push([sx,sy,sx2,sy2,sx3,sy3]);
      }
    }
  }
  return result;
}

function getRectInstances(mode, foldLines, x,y,w,h) {
  if (!foldLines.length && mode !== 'radial' && mode !== 'fractal' && mode !== 'triply') return [[x,y,w,h]];
  let result = [[x,y,w,h]];
  if (mode === 'mirror' && foldLines.length) {
    foldLines.forEach(f => {
      const next = [];
      result.forEach(([ax,ay,aw,ah]) => {
        next.push([ax,ay,aw,ah]);
        const rc = reflectPoint(ax+aw/2, ay+ah/2, f.x1,f.y1, f.x2,f.y2);
        next.push([rc.x-aw/2, rc.y-ah/2, aw, ah]);
      });
      result = next;
    });
  }
  if (mode === 'radial') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + animTime * speed * 0.1;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, w, h]);
    }
  }
  if (mode === 'triply') {
    const n = 3;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, w, h]);
    }
  }
  if (mode === 'fractal') {
    result = [];
    const subdiv = 4;
    for (let i = 0; i < subdiv; i++) {
      for (let j = 0; j < subdiv; j++) {
        result.push([x*(0.4+i*0.3), y*(0.4+j*0.3), w*0.3, h*0.3]);
      }
    }
  }
  return result;
}

function getFoldInstances(mode, foldLines, x, y, x2, y2) {
  if (!foldLines.length && mode !== 'radial' && mode !== 'kaleido' && mode !== 'crystal' && mode !== 'fractal' && mode !== 'triply') return [[x,y,x2,y2]];
  let result = [[x,y,x2,y2]];
  if (mode === 'mirror' && foldLines.length) {
    result = getLineInstances(foldLines, x, y, x2, y2);
  }
  if (mode === 'radial') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + animTime * speed * 0.1;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, x2*cos - y2*sin, x2*sin + y2*cos]);
    }
  }
  if (mode === 'kaleido') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, x2*cos - y2*sin, x2*sin + y2*cos]);
      result.push([-x*cos + y*sin, -x*sin - y*cos, -x2*cos + y2*sin, -x2*sin - y2*cos]);
    }
  }
  if (mode === 'crystal') {
    const n = radialCount;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, x2*cos - y2*sin, x2*sin + y2*cos]);
      const rc = reflectPoint(x*cos - y*sin, x*sin + y*cos, 0, 0, cos*100, sin*100);
      const rc2 = reflectPoint(x2*cos - y2*sin, x2*sin + y2*cos, 0, 0, cos*100, sin*100);
      result.push([rc.x, rc.y, rc2.x, rc2.y]);
    }
  }
  if (mode === 'triply') {
    const n = 3;
    result = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      result.push([x*cos - y*sin, x*sin + y*cos, x2*cos - y2*sin, x2*sin + y2*cos]);
    }
  }
  if (mode === 'fractal') {
    result = [];
    const subdiv = 4;
    for (let i = 0; i < subdiv; i++) {
      for (let j = 0; j < subdiv; j++) {
        const sx = x * (0.4 + i * 0.3);
        const sy = y * (0.4 + j * 0.3);
        const sx2 = x2 * (0.4 + i * 0.3);
        const sy2 = y2 * (0.4 + j * 0.3);
        result.push([sx, sy, sx2, sy2]);
      }
    }
  }
  return result;
}

// ─── Particles ───
function spawnParticles(screenX, screenY, hue, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3 + audioLevel * 5;
    particles.push({
      x: screenX, y: screenY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      r: 2 + Math.random() * 3 + audioLevel * 3,
      hue
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.life * 0.8})`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
  });
}

// ─── Background Grid ───
function drawBackground() {
  const theme = getTheme();
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  // Audio-reactive vignette
  if (audioEnabled && bassLevel > 0.1) {
    const vg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
    vg.addColorStop(0, 'transparent');
    vg.addColorStop(1, `hsla(${theme.hueBase},80%,5%,${bassLevel * 0.4})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);
  ctx.translate(CX, CY);

  const gridSize = 40;
  const cols = Math.ceil(W / zoom / gridSize) + 4;
  const rows = Math.ceil(H / zoom / gridSize) + 4;
  const startX = -Math.ceil(W / zoom / 2) - 2;
  const startY = -Math.ceil(H / zoom / 2) - 2;

  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= cols; i++) {
    const x = (startX + i) * gridSize;
    ctx.beginPath();
    ctx.moveTo(x, startY * gridSize);
    ctx.lineTo(x, (startY + rows) * gridSize);
    ctx.stroke();
  }
  for (let j = 0; j <= rows; j++) {
    const y = (startY + j) * gridSize;
    ctx.beginPath();
    ctx.moveTo(startX * gridSize, y);
    ctx.lineTo((startX + cols) * gridSize, y);
    ctx.stroke();
  }

  // Radial fold guide rings
  if (['radial','kaleido','crystal','triply','fractal'].includes(mode)) {
    const n = mode === 'triply' ? 3 : mode === 'fractal' ? 4 : radialCount;
    ctx.strokeStyle = theme.foldLine;
    ctx.lineWidth = 1;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + (['radial'].includes(mode) ? animTime * speed * 0.1 : 0);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const cos = Math.cos(a), sin = Math.sin(a);
      ctx.lineTo(cos * 800, sin * 800);
      ctx.stroke();
    }
    ctx.strokeStyle = theme.foldLine.replace('0.35', '0.12');
    [100, 200, 300, 400].forEach(r => {
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.stroke();
    });
    // Fractal guide grid
    if (mode === 'fractal') {
      ctx.strokeStyle = theme.foldLine.replace('0.35', '0.08');
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          const gx = (i - 1.5) * 80;
          const gy = (j - 1.5) * 80;
          ctx.strokeRect(gx - 20, gy - 20, 40, 40);
        }
      }
    }
  }

  // Fold lines preview
  if (mode === 'mirror') {
    foldLines.forEach((f, i) => {
      ctx.strokeStyle = i === hoveredFoldIdx
        ? `${theme.neon}cc`
        : theme.foldLine;
      ctx.lineWidth = i === hoveredFoldIdx ? 2 : 1;
      ctx.shadowColor = theme.neon;
      ctx.shadowBlur = i === hoveredFoldIdx ? 15 : 5;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(f.x1, f.y1);
      ctx.lineTo(f.x2, f.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = i === hoveredFoldIdx ? theme.neon : theme.accent;
      ctx.beginPath(); ctx.arc(f.x1,f.y1,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(f.x2,f.y2,4,0,Math.PI*2); ctx.fill();
    });
  }

  ctx.restore();
}

// ─── Connection Mesh ───
function drawMesh() {
  if (!showMesh || shapes.length < 2) return;
  const theme = getTheme();
  shapes.forEach(s1 => {
    const c1 = s1.getCenter();
    shapes.forEach(s2 => {
      if (s2 === s1) return;
      const c2 = s2.getCenter();
      const dist = Math.hypot(c2.x - c1.x, c2.y - c1.y);
      if (dist < meshDist) {
        const alpha = (1 - dist / meshDist) * 0.25 * (1 + audioLevel * 2);
        ctx.strokeStyle = `hsla(${theme.hueBase + (s1.hue % 60)},80%,70%,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(c1.x + CX + panX, c1.y + CY + panY);
        ctx.lineTo(c2.x + CX + panX, c2.y + CY + panY);
        ctx.stroke();
      }
    });
  });
}

// ─── Render ───
function render() {
  // Trail canvas fade
  trailCtx.fillStyle = 'rgba(5,5,5,0.15)';
  trailCtx.fillRect(0, 0, W, H);

  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // Draw shapes with fold mirroring
  shapes.forEach(s => {
    ctx.shadowBlur = 0;
    s.drawFolded(ctx, mode, foldLines);
  });

  // Mesh connections
  drawMesh();

  // Active drawing preview
  if (drawing) {
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);
    ctx.translate(CX, CY);
    ctx.globalAlpha = 0.5;
    drawing.draw(ctx);
    ctx.restore();
  }

  // Particles
  ctx.shadowBlur = 0;
  drawParticles();

  // Composite trail onto main canvas
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(trailCanvas, 0, 0);
  ctx.globalCompositeOperation = 'source-over';

  updateStats();
}

function updateStats() {
  const foldCountEl = document.getElementById('foldStat');
  const shapeStatEl = document.getElementById('shapeStat');
  const foldCount = document.getElementById('fold-count');
  if (foldCountEl) foldCountEl.textContent = `${foldLines.length} fold${foldLines.length !== 1 ? 's' : ''}`;
  if (shapeStatEl) shapeStatEl.textContent = `${shapes.length} shape${shapes.length !== 1 ? 's' : ''}`;
  if (foldCount) {
    foldCount.textContent = mode === 'mirror' ? `${foldLines.length} FOLD${foldLines.length !== 1 ? 'S' : ''} ACTIVE` : mode.toUpperCase() + ' ×' + radialCount;
  }
}

// ─── Animation Loop ───
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  animTime += dt;

  // Audio analysis
  getAudioLevels();

  shapes.forEach(s => s.update());
  updateParticles();

  // Demo mode auto-draw
  if (demoMode) {
    demoTimer -= dt * 16;
    if (demoTimer <= 0) {
      autoDraw();
      demoTimer = 200 + Math.random() * 400;
    }
  }

  render();
  requestAnimationFrame(loop);
}

// ─── Input: Mouse ───
let mouseDown = false;
let startPt = null;

function screenToWorld(sx, sy) {
  return {
    x: (sx - CX - panX) / zoom,
    y: (sy - CY - panY) / zoom
  };
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
    isPanning = true;
    lastPan = { x: e.clientX, y: e.clientY };
    return;
  }
  if (e.button !== 0) return;
  mouseDown = true;
  const w = screenToWorld(e.clientX, e.clientY);
  startPt = w;

  if (tool === 'scatter') {
    saveHistory();
    const s = new ScatterShape(w.x, w.y, 25 + Math.floor(Math.random() * 20));
    shapes.push(s);
    spawnParticles(e.clientX, e.clientY, s.hue, 20 + Math.floor(audioLevel * 20));
  }
});

canvas.addEventListener('mousemove', e => {
  if (isPanning) {
    panX += e.clientX - lastPan.x;
    panY += e.clientY - lastPan.y;
    lastPan = { x: e.clientX, y: e.clientY };
    return;
  }
  if (!mouseDown || !startPt) return;
  const w = screenToWorld(e.clientX, e.clientY);

  if (tool === 'line') {
    drawing = new LineShape(startPt.x, startPt.y, w.x, w.y);
  } else if (tool === 'circle') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    drawing = new CircleShape(startPt.x, startPt.y, r);
  } else if (tool === 'triangle') {
    drawing = new TriangleShape(startPt.x, startPt.y, w.x, w.y);
  } else if (tool === 'rect') {
    drawing = new RectShape(startPt.x, startPt.y, w.x - startPt.x, w.y - startPt.y);
  } else if (tool === 'star') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    drawing = new StarShape(startPt.x, startPt.y, r);
  }

  hoveredFoldIdx = -1;
  if (mode === 'mirror') {
    foldLines.forEach((f, i) => {
      const dist = pointToSegmentDist(w.x, w.y, f.x1, f.y1, f.x2, f.y2);
      if (dist < 10 / zoom) hoveredFoldIdx = i;
    });
  }
});

canvas.addEventListener('mouseup', e => {
  if (isPanning) { isPanning = false; return; }
  if (!mouseDown) return;
  mouseDown = false;

  if (!startPt) return;
  const w = screenToWorld(e.clientX, e.clientY);

  if (drawing && tool !== 'scatter') {
    saveHistory();
    if (tool === 'line') shapes.push(new LineShape(startPt.x, startPt.y, w.x, w.y));
    else if (tool === 'circle') {
      const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
      if (r > 5) shapes.push(new CircleShape(startPt.x, startPt.y, r));
    }
    else if (tool === 'triangle') shapes.push(new TriangleShape(startPt.x, startPt.y, w.x, w.y));
    else if (tool === 'rect') shapes.push(new RectShape(startPt.x, startPt.y, w.x-startPt.x, w.y-startPt.y));
    else if (tool === 'star') {
      const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
      if (r > 5) shapes.push(new StarShape(startPt.x, startPt.y, r));
    }

    if (shapes.length) {
      const last = shapes[shapes.length-1];
      spawnParticles(w.x + CX + panX, w.y + CY + panY, last.hue, 12 + Math.floor(audioLevel * 15));
    }
  }

  drawing = null;
  startPt = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  const wx = (mx - CX - panX) / zoom;
  const wy = (my - CY - panY) / zoom;
  zoom = Math.max(0.1, Math.min(10, zoom * delta));
  panX = mx - CX - wx * zoom;
  panY = my - CY - wy * zoom;
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (mode !== 'mirror') return;
  saveHistory();
  const w = screenToWorld(e.clientX, e.clientY);
  const len = 200;
  const angle = Math.random() * Math.PI;
  foldLines.push({
    x1: w.x - Math.cos(angle) * len/2,
    y1: w.y - Math.sin(angle) * len/2,
    x2: w.x + Math.cos(angle) * len/2,
    y2: w.y + Math.sin(angle) * len/2
  });
  spawnParticles(e.clientX, e.clientY, 45, 15);
});

function pointToSegmentDist(px, py, x1,y1, x2,y2) {
  const dx = x2-x1, dy = y2-y1;
  const len2 = dx*dx + dy*dy;
  if (len2 < 0.001) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / len2));
  return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
}

// ─── History ───
function saveHistory() {
  history.push({ shapes: JSON.parse(JSON.stringify(shapes)), foldLines: JSON.parse(JSON.stringify(foldLines)) });
  if (history.length > 50) history.shift();
}

// ─── Demo ───
function autoDraw() {
  saveHistory();
  const tools = ['line', 'circle', 'triangle', 'scatter', 'rect', 'star'];
  const t = tools[Math.floor(Math.random() * tools.length)];
  const angle = Math.random() * Math.PI * 2;
  const dist = 50 + Math.random() * 150;
  const x = Math.cos(angle) * dist;
  const y = Math.sin(angle) * dist;
  const x2 = x + (Math.random()-0.5)*200;
  const y2 = y + (Math.random()-0.5)*200;

  if (t === 'line') shapes.push(new LineShape(x, y, x2, y2));
  else if (t === 'circle') shapes.push(new CircleShape(x, y, 20 + Math.random()*60));
  else if (t === 'triangle') shapes.push(new TriangleShape(x, y, x2, y2));
  else if (t === 'rect') shapes.push(new RectShape(x, y, (Math.random()-0.5)*150, (Math.random()-0.5)*150));
  else if (t === 'star') shapes.push(new StarShape(x, y, 20 + Math.random()*50));
  else shapes.push(new ScatterShape(x, y, 20 + Math.floor(Math.random()*25)));
}

// ─── UI ───
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    if (mode !== 'mirror') foldLines = [];
  });
});

document.querySelectorAll('[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (shapes.length || foldLines.length) {
    saveHistory();
    shapes = [];
    foldLines = [];
  }
});

document.getElementById('undoBtn').addEventListener('click', () => {
  if (history.length) {
    const h = history.pop();
    shapes = h.shapes;
    foldLines = h.foldLines;
  }
});

document.getElementById('saveBtn').addEventListener('click', savePNG);
function savePNG() {
  // Composite trail + main onto temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = getTheme().bg;
  tctx.fillRect(0, 0, W, H);
  tctx.drawImage(trailCanvas, 0, 0);
  tctx.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'fractal-fold.png';
  link.href = tmp.toDataURL('image/png');
  link.click();
}

document.getElementById('demoBtn').addEventListener('click', () => {
  demoMode = !demoMode;
  document.getElementById('demoBtn').classList.toggle('active', demoMode);
  demoTimer = 100;
});

document.getElementById('meshBtn').addEventListener('click', () => {
  showMesh = !showMesh;
  document.getElementById('meshBtn').classList.toggle('active', showMesh);
});

document.getElementById('audioBtn').addEventListener('click', () => {
  if (!audioEnabled) {
    initAudio();
  } else {
    audioEnabled = false;
    if (audioCtx) audioCtx.close();
    audioCtx = null;
    analyser = null;
    document.getElementById('audio-status').textContent = '';
    document.getElementById('audioBtn').classList.remove('active');
  }
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speed = e.target.value / 100 * 2;
});
document.getElementById('glowSlider').addEventListener('input', e => {
  glowIntensity = e.target.value / 100;
});
document.getElementById('radialN').addEventListener('input', e => {
  radialCount = parseInt(e.target.value);
});
document.getElementById('meshDist').addEventListener('input', e => {
  meshDist = parseInt(e.target.value);
});

// ─── Keyboard ───
window.addEventListener('keydown', e => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (shapes.length) {
      saveHistory();
      shapes.pop();
    }
  }
  if (e.key === 's' && !e.ctrlKey) savePNG();
  if (e.key === 'r' && !e.ctrlKey) {
    autoDraw(); autoDraw();
  }
  if (e.key === 'z' && !e.ctrlKey && history.length) {
    const h = history.pop();
    shapes = h.shapes; foldLines = h.foldLines;
  }
  if (e.key === 'Escape') {
    demoMode = false;
    document.getElementById('demoBtn').classList.remove('active');
  }
  if (e.key === 't' || e.key === 'T') {
    cycleTheme();
  }
  if (e.key === 'l' || e.key === 'L') {
    showMesh = !showMesh;
    document.getElementById('meshBtn').classList.toggle('active', showMesh);
  }
  if (e.key === 'p' || e.key === 'P') {
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tctx = tmp.getContext('2d');
    tctx.fillStyle = getTheme().bg;
    tctx.fillRect(0, 0, W, H);
    tctx.drawImage(trailCanvas, 0, 0);
    tctx.drawImage(canvas, 0, 0);
    const link = document.createElement('a');
    link.download = 'fractal-fold.png';
    link.href = tmp.toDataURL('image/png');
    link.click();
  }
});

// ─── Touch ───
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseDown = true;
  const w = screenToWorld(t.clientX, t.clientY);
  startPt = w;
  if (tool === 'scatter') {
    saveHistory();
    shapes.push(new ScatterShape(w.x, w.y, 30));
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const w = screenToWorld(t.clientX, t.clientY);
  if (!startPt) return;
  if (tool === 'line') drawing = new LineShape(startPt.x, startPt.y, w.x, w.y);
  else if (tool === 'circle') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    drawing = new CircleShape(startPt.x, startPt.y, r);
  } else if (tool === 'triangle') drawing = new TriangleShape(startPt.x, startPt.y, w.x, w.y);
  else if (tool === 'rect') drawing = new RectShape(startPt.x, startPt.y, w.x-startPt.x, w.y-startPt.y);
  else if (tool === 'star') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    drawing = new StarShape(startPt.x, startPt.y, r);
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!startPt || !drawing) { mouseDown = false; return; }
  const t = e.changedTouches[0];
  const w = screenToWorld(t.clientX, t.clientY);
  saveHistory();
  if (tool === 'line') shapes.push(new LineShape(startPt.x, startPt.y, w.x, w.y));
  else if (tool === 'circle') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    if (r > 5) shapes.push(new CircleShape(startPt.x, startPt.y, r));
  } else if (tool === 'triangle') shapes.push(new TriangleShape(startPt.x, startPt.y, w.x, w.y));
  else if (tool === 'rect') shapes.push(new RectShape(startPt.x, startPt.y, w.x-startPt.x, w.y-startPt.y));
  else if (tool === 'star') {
    const r = Math.hypot(w.x - startPt.x, w.y - startPt.y);
    if (r > 5) shapes.push(new StarShape(startPt.x, startPt.y, r));
  }
  mouseDown = false; drawing = null; startPt = null;
}, { passive: false });

// ─── Boot ───
requestAnimationFrame(loop);
</script>
</body>
